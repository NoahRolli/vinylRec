# CI Pipeline — läuft bei jedem Push auf main und bei Pull Requests
# Zwei Jobs: Erst Linting (Code-Qualität), dann Tests
name: CI

on:
  # Trigger: Push auf main-Branch
  push:
    branches: [main]
  # Trigger: Pull Request gegen main
  pull_request:
    branches: [main]

jobs:
  # Job 1: Code-Qualität prüfen mit ruff
  lint:
    runs-on: ubuntu-latest
    steps:
      # Repository auschecken
      - uses: actions/checkout@v4

      # Python installieren
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Abhängigkeiten + Linter installieren
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      # Linting ausführen — prüft Stil, Imports, häufige Fehler
      - name: Lint with ruff
        run: ruff check .

  # Job 2: Tests ausführen — läuft nur wenn Linting bestanden
  test:
    runs-on: ubuntu-latest
    needs: lint  # Wartet auf erfolgreichen lint-Job
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # Alle Tests im test/-Ordner ausführen
      # -v für ausführliche Ausgabe
      - name: Run tests
        run: pytest test/ -v