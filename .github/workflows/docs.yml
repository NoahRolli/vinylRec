# Dokumentation automatisch bauen und auf GitHub Pages deployen
name: Docs

on:
  push:
    branches: [main]

# Berechtigung für GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Pinne mkdocs-material auf Version 9 — Version 2.0 von MkDocs ist inkompatibel
      - name: Install MkDocs
        run: |
          pip install "mkdocs<2"
          pip install "mkdocs-material<10"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force